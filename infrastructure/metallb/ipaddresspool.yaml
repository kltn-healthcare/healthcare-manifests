apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  # Updated to match your exact pool name
  name: lab-pool
  namespace: metallb-system
spec:
  # Updated to match your actual lab network range
  addresses:
  - 192.168.10.230-192.168.10.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: lab-l2-advert
  namespace: metallb-system
spec:
  # Bind this advertisement to the specific pool defined above
  ipAddressPools:
  - lab-pool