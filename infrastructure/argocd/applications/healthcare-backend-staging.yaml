apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthcare-backend-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea.kltn.internal/KLTN/healthcare-manifests.git
    targetRevision: main
    path: apps/overlays/staging/backend-service
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=false
      - ApplyOutOfSyncOnly=true
