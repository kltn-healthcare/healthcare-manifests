apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://grafana-community.github.io/helm-charts"
    chart: grafana
    targetRevision: "12.4.2"
    helm:
      releaseName: grafana
      values: |
        adminUser: admin
        adminPassword: admin123
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        replicas: 2
        service:
          type: LoadBalancer
          loadBalancerIP: 192.168.10.235
        persistence:
          enabled: true
          size: 5Gi
          storageClass: longhorn
        grafana.ini:
          feature_toggles:
            kubernetesDashboards: false
            kubernetesClientDashboardsFolders: false
          database:
            wal: true          # bật WAL mode cho SQLite, giảm lock
            max_open_conn: 5   # giới hạn concurrent connection
            max_idle_conn: 2
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-server.monitoring.svc.cluster.local
                isDefault: true
              # - name: Loki
              #   type: loki
              #   url: http://loki.monitoring.svc.cluster.local:3100
              #   isDefault: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=true
      - PruneLast=true
