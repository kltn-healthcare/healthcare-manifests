apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts"
    chart: prometheus
    targetRevision: "29.9.0"
    helm:
      releaseName: prometheus
      values: |
        server:
          retention: 2d
          retentionSize: "10GB"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1500Mi 
          persistentVolume:
            enabled: true
            size: 15Gi
            storageClass: longhorn
          service:
            type: LoadBalancer
            loadBalancerIP: 192.168.10.234
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=true
      - PruneLast=true