apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://gitea.kltn.internal/KLTN/healthcare-manifests.git'
    targetRevision: main
    path: apps/overlays/staging/auth-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
