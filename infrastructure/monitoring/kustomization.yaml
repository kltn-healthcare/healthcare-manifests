apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - grafana-admin-secret.yaml
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 84.5.0
    releaseName: monitoring
    namespace: monitoring
    includeCRDs: true
    valuesInline:
      grafana:
        admin:
          existingSecret: grafana-admin
          userKey: admin-user
          passwordKey: admin-password
        persistence:
          enabled: true
          size: 10Gi
      prometheus:
        prometheusSpec:
          retention: 7d
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 15Gi
