apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ensure the namespace matches the default Helm install.
namespace: longhorn-system

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.11.1
    releaseName: longhorn
    valuesInline:
      # Enable ServiceMonitor for Prometheus/Alloy to scrape
      metrics:
        serviceMonitor:
          enabled: true 
      # Disable the pre-upgrade check job to avoid ArgoCD blocking.
      preUpgradeChecker:
        jobEnabled: false
      # Keep other defaults unchanged.
      persistence:
        defaultClassReplicaCount: 2
      longhornManager:
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      backend:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9500"
          prometheus.io/path: "/metrics"
resources:
  - namespace.yaml
patchesStrategicMerge:
  - longhorn-frontend-service.yaml
