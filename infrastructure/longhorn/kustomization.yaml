apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ensure the namespace matches the default Helm install.
namespace: longhorn-system

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.11.1
    # Matches the release name used by 'helm install longhorn'.
    releaseName: longhorn 
    valuesInline:
      # Disable the pre-upgrade check job to avoid ArgoCD blocking.
      preUpgradeChecker:
        jobEnabled: false
      # Keep other defaults unchanged.
      persistence:
        defaultClassReplicaCount: 1
resources:
  - namespace.yaml
patchesStrategicMerge:
  - longhorn-frontend-service.yaml
