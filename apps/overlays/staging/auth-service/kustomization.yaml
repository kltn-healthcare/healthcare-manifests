apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/auth-service
namespace: staging
images:
  - name: gitea.healthcare.com/kltn/healthcare-auth
    newTag: "41709d06"

patches:
  - target:
      kind: Deployment
      name: healthcare-auth
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
