apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifests
resources:
  - ../../../base/frontend
namespace: staging

images:
  - name: gitea.healthcare.com/kltn/healthcare-frontend
    newTag: "c83f771a"

# Apply the patches
patches:
  - path: service-patch.yaml
  - path: replica-patch.yaml
  - target:
      kind: Deployment
      name: healthcare-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
  - target:
      kind: Deployment
      name: healthcare-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 75m
            memory: 96Mi
          limits:
            cpu: 200m
            memory: 192Mi
