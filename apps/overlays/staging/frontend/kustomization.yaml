apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifests
resources:
  - ../../../base/frontend

# Add prefix to resources for environment isolation
namePrefix: staging-

# Apply the LoadBalancer patch
patches:
  - path: service-patch.yaml

# Dynamic image tag update from Gitea/Jenkins
images:
  - name: gitea.kltn.internal/kltn/healthcare-frontend
    newName: gitea.kltn.internal/kltn/healthcare-frontend
    newTag: "39" # Jenkins will automatically update this value per build