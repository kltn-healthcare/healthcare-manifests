apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/admin-service
namespace: staging
images:
  - name: gitea.healthcare.com/kltn/healthcare-admin
    newTag: "7fdb22f2"

patches:
  - target:
      kind: Deployment
      name: healthcare-admin
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev

