apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: healthcare-app-route
  namespace: staging
spec:
  hostnames:
    - "staging.healthcare.com"
  parentRefs:
    - name: eg
      namespace: default
      group: gateway.networking.k8s.io
      kind: Gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /docs
      backendRefs:
        - name: healthcare-appointment
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1/auth
      backendRefs:
        - name: healthcare-identity
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/doctor-admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1/doctor-admin
      backendRefs:
        - name: healthcare-admin
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1/admin
      backendRefs:
        - name: healthcare-admin
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1
      backendRefs:
        - name: healthcare-appointment
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: healthcare-frontend
          port: 80
