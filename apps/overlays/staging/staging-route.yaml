apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: staging-route
  namespace: staging # Route này nằm ở namespace staging
spec:
  parentRefs:
    - name: eg
      namespace: default # Chỉ định rõ Gateway nằm ở namespace default
      # CHỈNH SỬA: Bổ sung group và kind để đảm bảo Route kết nối chính xác tới Gateway
      group: gateway.networking.k8s.io
      kind: Gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /staging
      backendRefs:
        - name: healthcare-frontend
          port: 80
          # CHỈNH SỬA: Đã xóa dòng "namespace: staging" ở đây. 
          # Lý do: Mặc định backend sẽ được tìm trong cùng namespace với HTTPRoute. 
          # Việc khai báo tường minh namespace ở đây có thể gây ra lỗi thiếu quyền ReferenceGrant.