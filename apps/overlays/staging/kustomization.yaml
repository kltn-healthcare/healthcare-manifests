apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - global-externalsecret.yaml
  - admin-service
  - auth-service
  - backend-service
  - frontend
  - http-route.yaml

patches:
  - target:
      kind: Deployment
      name: healthcare-identity
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
  - target:
      kind: Deployment
      name: healthcare-appointment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
  - target:
      kind: Deployment
      name: healthcare-admin
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
  - target:
      kind: Deployment
      name: healthcare-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
