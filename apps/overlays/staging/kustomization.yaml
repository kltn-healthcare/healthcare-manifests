apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - global-externalsecret.yaml
  - admin-service
  - identity-service
  - appointment-service
  - frontend
  - http-route.yaml
  - http-route-admin.yaml
  - ../../../databases/overlays/identity-db
  - ../../../databases/overlays/admin-db
  - ../../../databases/overlays/appointment-db

patches:
  - target:
      kind: Deployment
      name: healthcare-identity
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: healthcare-global-secret-dev
                key: DATABASE_URL_IDENTITY
          - name: IDENTITY_SERVICE_URL
            value: "http://healthcare-identity"
          - name: ADMIN_SERVICE_URL
            value: "http://healthcare-admin"
          - name: APPOINTMENT_SERVICE_URL
            value: "http://healthcare-appointment"
  - target:
      kind: Deployment
      name: healthcare-appointment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: healthcare-global-secret-dev
                key: DATABASE_URL_APPOINTMENT
          - name: IDENTITY_SERVICE_URL
            value: "http://healthcare-identity"
          - name: ADMIN_SERVICE_URL
            value: "http://healthcare-admin"
          - name: APPOINTMENT_SERVICE_URL
            value: "http://healthcare-appointment"
  - target:
      kind: Deployment
      name: healthcare-admin
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: healthcare-global-secret-dev
                key: DATABASE_URL_ADMIN
          - name: IDENTITY_SERVICE_URL
            value: "http://healthcare-identity"
          - name: ADMIN_SERVICE_URL
            value: "http://healthcare-admin"
          - name: APPOINTMENT_SERVICE_URL
            value: "http://healthcare-appointment"
  - target:
      kind: Deployment
      name: healthcare-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/secretRef/name
        value: healthcare-global-secret-dev
