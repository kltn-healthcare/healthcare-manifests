apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/frontend
namespace: production

images:
  - name: gitea.healthcare.com/kltn/healthcare-frontend
    newTag: "v5.0.1"

patches:
  - path: service-patch.yaml
  - path: replica-patch.yaml
  - target:
      kind: Deployment
      name: healthcare-frontend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
