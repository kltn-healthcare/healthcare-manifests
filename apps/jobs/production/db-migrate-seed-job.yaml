apiVersion: batch/v1
kind: Job
metadata:
  name: healthcare-db-migrate-seed
  namespace: production
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: gitea-registry-secret
      containers:
        - name: migrate-seed
          image: gitea.healthcare.com/kltn/healthcare-appointment:v5.0.1
          envFrom:
            - secretRef:
                name: healthcare-global-secret-prod
          env:
            - name: RUN_DEMO_SEED
              value: "false"
          command:
            - sh
            - -c
            - |
              set -e
              test -n "$DATABASE_URL_IDENTITY" || (echo "DATABASE_URL_IDENTITY is missing from healthcare-global-secret-prod" && exit 1)
              test -n "$DATABASE_URL_ADMIN" || (echo "DATABASE_URL_ADMIN is missing from healthcare-global-secret-prod" && exit 1)
              test -n "$DATABASE_URL_APPOINTMENT" || (echo "DATABASE_URL_APPOINTMENT is missing from healthcare-global-secret-prod" && exit 1)

              echo "Pushing Identity database schema..."
              PRISMA_SCHEMA_PATH="apps/identity/prisma/schema.prisma" DATABASE_URL="$DATABASE_URL_IDENTITY" npx prisma db push --accept-data-loss

              echo "Pushing Admin database schema..."
              PRISMA_SCHEMA_PATH="apps/admin/prisma/schema.prisma" DATABASE_URL="$DATABASE_URL_ADMIN" npx prisma db push --accept-data-loss

              echo "Pushing Appointment database schema..."
              PRISMA_SCHEMA_PATH="apps/appointment/prisma/schema.prisma" DATABASE_URL="$DATABASE_URL_APPOINTMENT" npx prisma db push --accept-data-loss

              echo "Seeding databases..."
              npx tsx prisma/seed.ts
