apiVersion: batch/v1
kind: Job
metadata:
  name: healthcare-db-migrate-seed
  namespace: staging
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: gitea-registry-secret
      containers:
        - name: migrate-seed
          image: gitea.kltn.internal:80/kltn/healthcare-backend:57658134
          envFrom:
            - secretRef:
                name: healthcare-global-secret-dev
          env:
            - name: RUN_DEMO_SEED
              value: "false"
          command:
            - sh
            - -c
            - |
              set -e
              npx prisma migrate deploy
              node prisma/seed-admin.js
              if [ "$RUN_DEMO_SEED" = "true" ]; then
                npx ts-node prisma/seed-demo.ts
              fi
