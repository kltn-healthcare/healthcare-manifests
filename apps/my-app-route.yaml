apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kltn-backends-route
  namespace: default
spec:
  parentRefs:
    - name: eg 
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: / 
      backendRefs:
        - name: web-svc 
          port: 80