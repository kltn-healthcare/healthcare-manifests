apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcare-backend
  template:
    metadata:
      labels:
        app: healthcare-backend
    spec:
      containers:
        - name: healthcare-backend
          image: healthcare-backend-image:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secret
      imagePullSecrets:
        - name: gitea-registry-secret
