apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-auth
  labels:
    app: healthcare-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcare-auth
  template:
    metadata:
      labels:
        app: healthcare-auth
    spec:
      containers:
        - name: auth-service
          image: gitea.kltn.internal:80/kltn/healthcare-auth:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: healthcare-app-secret
      imagePullSecrets:
        - name: gitea-registry-secret
